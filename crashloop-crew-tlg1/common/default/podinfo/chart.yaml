apiVersion: "helm.toolkit.fluxcd.io/v2"
kind: "HelmRelease"
metadata:
  name: "podinfo"
  namespace: "default"

spec:
  interval: "10m"

  chart:
    spec:
      interval: "10m"

      sourceRef:
        kind: "HelmRepository"
        name: "podinfo"

      chart: "podinfo"
      version: "6.11.2"

  values:
    ingress:
      enabled: true

      className: "nginx"

      hosts:
      - host: "podinfo-default-${replica}.${name}.${domain}"
        paths:
        - path: "/"
          pathType: "ImplementationSpecific"

    ui:
      message: "${name^^} ${replica^^}"
